name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r producer/requirements.txt
          python -m pip install -r middleware/requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install pytest

      - name: Run pytest suite
        run: |
          python -m pytest -q

      - name: Validate docker compose config
        run: |
          docker compose -f docker-compose.yml config

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r producer/requirements.txt
          python -m pip install -r middleware/requirements.txt

      - name: Run E2E smoke script
        run: |
          python scripts/e2e_smoke.py

      - name: Generate performance report
        if: always()
        run: |
          python scripts/performance_report.py --reports-dir reports --skip-queue-fetch

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-artifacts
          path: output/

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-artifacts
          path: |
            reports/
            !reports/**/__pycache__/**
